<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>인스타 정보</title>
<style>
    body {
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 20px;
        width: 320px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
        transition: 0.3s;
    }

    h2 {
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ddd;
        margin-bottom: 15px;
        outline: none;
        font-size: 14px;
    }

    .info {
        display: none;
        margin-top: 10px;
    }

    .item {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 10px;
        margin: 10px 0;
        cursor: pointer;
        transition: 0.2s;
    }

    .item:hover {
        background: #e0e0e0;
    }

    .copied {
        color: green;
        font-size: 12px;
        display: none;
    }
</style>
</head>
<body>

<div class="card">
    <h2>인스타 본계</h2>

    <input type="password" id="pwInput" placeholder="비밀번호 입력">

    <div class="info" id="infoBox">
        <div class="item" onclick="copyText('userId')">
            아이디: <span id="userId">yxu.so_0</span>
        </div>

        <div class="item" onclick="copyText('userPw')">
            비번: <span id="userPw">$jMy-+fk4}9p3nBkQ^0i%I}W4vrOMrmHbwuGDHYCZHkwTPYgTs</span>
        </div>

        <div class="copied" id="copyMsg">복사되었습니다!</div>
    </div>
</div>

<script>
    const input = document.getElementById('pwInput');
    const infoBox = document.getElementById('infoBox');

    input.addEventListener('input', () => {
        if (input.value === "479173001") {
            // 입력창 사라지기
            input.style.display = "none";

            // 정보 표시
            infoBox.style.display = "block";
        }
    });

    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);

        const msg = document.getElementById('copyMsg');
        msg.style.display = "block";

        setTimeout(() => {
            msg.style.display = "none";
        }, 1500);
    }
</script>

</body>
</html>
