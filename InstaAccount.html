<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>비번 모음</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        text-align: center;
    }

    input {
        padding: 12px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        width: 260px;
        text-align: center;
        background: #1e293b;
        color: white;
    }

    .buttons {
        display: none;
        margin-top: 20px;
    }

    .copy-btn {
        display: block;
        margin: 10px auto;
        padding: 12px;
        width: 240px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, #22c55e, #3b82f6);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    .copy-btn:hover {
        transform: scale(1.05);
    }
</style>
</head>
<body>

<div class="container">
    <input type="password" id="codeInput" placeholder="코드 입력">

    <div class="buttons" id="buttonContainer"></div>
</div>

<script>
const input = document.getElementById('codeInput');
const container = document.getElementById('buttonContainer');
const target = "sys479173001??!!";

let unlocked = false;

// 버튼 데이터
const buttonData = [
    { label: "인스타 아이디 본계", text: "yxu.so_0" },
    { label: "인스타 비번 본계", text: "ZIAS18YPVVtuEv5zZXy5h4yorK" },
    { label: "인스타 아이디 부계", text: "0osuxy" },
    { label: "인스타 비번 부계", text: "dd" },
    { label: "인스타 아이디 비계", text: "u.sx_o7" },
    { label: "인스타 비번 비계", text: "Ft8YPFnF8CJ$,XCZq,jp5J0T7ZvA0UayeNJWvnvgSiJfuy5k5A" },
    { label: "로블록스 아이디", text: "PyeongSa_68" },
    { label: "로블록스 비번", text: "l9wzLBVg0llRvwtTaqp2aUSWl" },
    { label: "메시지 복사", text: "안녕하세요!" },
    { label: "기타 복사", text: "커스텀 텍스트" }
];

input.addEventListener('input', () => {
    if (unlocked) return;

    if (input.value === target) {
        unlocked = true;

        // 입력창 완전 제거
        input.remove();

        // 버튼 영역 표시
        container.style.display = 'block';

        // 버튼 생성
        buttonData.forEach((item) => {
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.textContent = item.label;

            btn.onclick = () => {
                navigator.clipboard.writeText(item.text);
                btn.textContent = "복사됨!";
                setTimeout(() => {
                    btn.textContent = item.label;
                }, 1000);
            };

            container.appendChild(btn);
        });
    }
});
</script>

</body>
</html>
